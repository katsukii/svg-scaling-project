# Medium model config (~12.2M params)
model:
  vocab_size: 4096
  block_size: 1024
  n_layer: 6
  n_head: 6
  n_embd: 384
  d_ff: 1536
  dropout: 0.0
  bias: false

training:
  batch_size: 16
  learning_rate: 3.0e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]
  grad_clip: 1.0
  warmup_frac: 0.03
  min_lr_frac: 0.1
  max_steps: null
  eval_interval: 200
  eval_steps: 50
  log_interval: 50
  checkpoint_interval: 1000

data:
  train_path: data/tokenized/train.bin
  val_path: data/tokenized/val.bin
